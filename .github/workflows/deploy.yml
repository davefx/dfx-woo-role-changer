name: Deploy to WordPress.org

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9]*'
  workflow_dispatch:

jobs:
  release:
    name: Deploy to wp.org SVN
    runs-on: ubuntu-latest
    steps:
      - name: Require tag ref
        if: github.ref_type != 'tag'
        run: |
          echo "::error::This workflow deploys a tagged release. Use the 'Use workflow from' dropdown in the UI to pick a tag, or push a YYYYMMDD tag."
          exit 1

      - uses: actions/checkout@v4

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: dfx-woo-role-changer
